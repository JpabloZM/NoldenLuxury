<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="200" height="100">
  <!-- Hat -->
  <ellipse cx="400" cy="80" rx="120" ry="40" fill="none" stroke="#2d5a7b" stroke-width="8"/>
  <path d="M 290 80 Q 290 60 400 40 Q 510 60 510 80" fill="none" stroke="#2d5a7b" stroke-width="8"/>
  <rect x="320" y="75" width="160" height="12" fill="#4a8ec2" rx="6"/>
  
  <!-- Fleur de lis ornament -->
  <g transform="translate(400, 150)">
    <!-- Center petal -->
    <path d="M 0 -80 Q -30 -40 -20 0 Q 0 20 20 0 Q 30 -40 0 -80" fill="#d4af37" stroke="#b8941e" stroke-width="2"/>
    <!-- Left petal -->
    <path d="M -60 -20 Q -70 20 -40 40 Q -20 35 -10 10 Q -40 -10 -60 -20" fill="#d4af37" stroke="#b8941e" stroke-width="2"/>
    <!-- Right petal -->
    <path d="M 60 -20 Q 70 20 40 40 Q 20 35 10 10 Q 40 -10 60 -20" fill="#d4af37" stroke="#b8941e" stroke-width="2"/>
    <!-- Left spiral -->
    <path d="M -80 20 Q -100 30 -90 50 Q -70 55 -60 40" fill="#d4af37" stroke="#b8941e" stroke-width="2"/>
    <!-- Right spiral -->
    <path d="M 80 20 Q 100 30 90 50 Q 70 55 60 40" fill="#d4af37" stroke="#b8941e" stroke-width="2"/>
  </g>
  
  <!-- Text: ARNOLUX -->
  <text x="400" y="320" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#d4af37" text-anchor="middle" letter-spacing="8">
    ARNOLUX
  </text>
  
  <!-- Tagline: El brillo de un legado -->
  <text x="400" y="370" font-family="Georgia, serif" font-size="24" fill="#c0a080" text-anchor="middle" font-style="italic" letter-spacing="2">
    El brillo de un legado
  </text>
</svg>